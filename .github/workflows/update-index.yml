name: AI Update Index

on:
  schedule:
    # 每周一 UTC 02:00 自动运行
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model ID (e.g. claude-opus-4-6)'
        required: false
        default: ''

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run update script
        run: python scripts/update_index.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # 优先级：手动输入 > Repository variable > 默认值
          CLAUDE_MODEL: ${{ inputs.model || vars.CLAUDE_MODEL || 'claude-opus-4-6' }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL || vars.ANTHROPIC_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 只有真正有变化时才 commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-update repos section via AI [skip ci]"
            git push
          fi
